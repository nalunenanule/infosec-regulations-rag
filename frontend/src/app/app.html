<div class="chat-container">

  <header class="chat-header">
    <button
      class="index-btn"
      (click)="indexDocuments()"
      [disabled]="indexing"
    >
      {{ indexing ? 'Индексирование…' : 'Индексировать' }}
    </button>
  </header>

  <div class="chat-body">
    @for (m of messages(); track m) {
    <div
      class="message"
      [class.user]="m.role === 'user'"
      [class.assistant]="m.role === 'assistant'"
    >
      {{ m.text }}
    </div>
  }
  </div>

  <div class="chat-input">
    <input
      [(ngModel)]="query"
      (keyup.enter)="sendQuery()"
      placeholder="Введите вопрос…"
    />
    <button (click)="sendQuery()">➤</button>
  </div>

</div>
